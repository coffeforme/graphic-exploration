<!DOCTYPE html>
<html>

<head>
    <meta charset=utf-8>
    <title>My first three.js app</title>
    <style>
        body {
            margin: 0;
        }

        canvas {
            width: 100%;
            height: 100%
        }
    </style>
</head>

<body>
    <script src="src/three.js-master/build/three.min.js"></script>
    <script src="src/utils/OBJLoader.js"></script>
    <script src="node_modules/jquery/dist/jquery.min.js"></script>
    <script>
        //scene
        var scene = new THREE.Scene();
        var camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

        //renderer
        var renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        //floor
        texturafloor = new THREE.TextureLoader().load('floor.jpeg')
        materialfloor = new THREE.MeshLambertMaterial({ map: texturafloor })
        geometriaPlana = new THREE.CubeGeometry(1, 1, 1);
        mtPlano = new THREE.MeshLambertMaterial({ color: 0xfaff00 });
        mallaPlano = new THREE.Mesh(geometriaPlana, materialfloor);
        mallaPlano.position.x = 0;
        mallaPlano.position.y = 0;
        mallaPlano.position.z = 0;
        //habilitando proyección de sombras sobre la superficie
        mallaPlano.castShadow = true;
        mallaPlano.receiveShadow = true;
        scene.add(mallaPlano);


        //Geometrias
        var geometry = new THREE.BoxGeometry(1, 1, 1);
        var material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
        var cube = new THREE.Mesh(geometry, material);
        scene.add(cube);




        //modelos
        // instantiate a loader
        var loader = new THREE.OBJLoader();
        var material = new THREE.MeshBasicMaterial({ color: 'yellow', side: THREE.DoubleSide });

        // load a resource
        loader.load(
            // resource URL
            'src/models/house.obj',
            // called when resource is loaded
            function (object) {
                object.traverse(function (child) {

                    if (child instanceof THREE.Mesh) {
                        child.material = material;
                    }

                });
                object.position.set(1,1,1)
                object.scale.set(0.1,0.1,0.1)
                scene.add(object);

            }
        );



        camera.position.z = 5;
        camera.position.y = 1;
        camera.lookAt(0, 0, 0);

        axes = new THREE.AxesHelper(20);
        scene.add(axes)

        function animate() {
            requestAnimationFrame(animate);

            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;

            renderer.render(scene, camera);
        }
        animate();


    </script>
</body>

</html>
